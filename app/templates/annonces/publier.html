{% extends 'annonces/base.html' %}
{% block titre %}Publier une annonce{% endblock %}
{% block contenu %}
<h1>Publier une nouvelle annonce</h1>
<form method="post" enctype="multipart/form-data" class="bloc">
    {% csrf_token %}
    <label>Titre</label>
    <input type="text" name="titre" required>
    <label>Catégorie</label>
    <select name="categorie" required>
        {% for cat in categories %}<option value="{{ cat.id }}">{{ cat.nom }}</option>{% endfor %}
    </select>
    <label>Description</label>
    <textarea name="description" rows="5" required></textarea>
    <label>Prix (Ariary)</label>
    <input type="number" step="0.01" name="prix" required>
    <label>État</label>
    <select name="etat">
        <option value="neuf">Neuf</option>
        <option value="bon">Bon état</option>
        <option value="moyen">État moyen</option>
    </select>
    <label>Ville</label>
    <input type="text" name="ville" required>
    <label>Latitude (lieu de publication, ex: -18.8792 pour Antananarivo)</label>
    <input type="text" name="latitude">
    <label>Longitude (ex: 47.5079)</label>
    <input type="text" name="longitude">
    <label>Photos (formats acceptés : jpg, jpeg, png, webp)</label>
    <input type="file" name="photos" multiple accept="image/jpeg,image/png,image/webp">
    <br><br>
    <button class="bouton" type="submit">Publier l'annonce</button>
</form>
{% endblock %}
